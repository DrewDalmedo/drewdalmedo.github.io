baseURL = 'https://drewdalmedo.github.io'
DefaultContentLanguage = 'en'
languageCode = 'en-us'
title = 'Drew Dalmedo'
theme = 'diary'

[params]
  subtitle = "My personal site"
  enableGitalk = false
  enableGiscus = false

  # Twitter Card and Open Graph settings
  enableOpenGraph = true
  enableTwitterCards = true
  title = "Drew Dalmedo"
  description = "Drew Dalmedo's personal blog."

  [taxonomies]
    tag = "tags"
    category = "categories"

  [[menu.main]]
    url = "/categories"
    name = "Categories"
    weight = 2
  [[menu.main]]
    url = "/tags"
    name = "Tags"
    weight = 3
  [[menu.main]]
    url = "/posts"
    name = "Archive"
    weight = 1
  [[menu.main]]
    url = "/index.xml"
    name = "RSS Feed"
    weight = 4
