baseURL = 'https://drewdalmedo.github.io'
DefaultContentLanguage = 'en'
languageCode = 'en-us'
title = 'Drew Dalmedo'
theme = 'diary'

[params]
  subtitle = "My personal site"
  enableGitalk = false
  enableGiscus = false

  # Twitter Card and Open Graph settings
  enableOpenGraph = true
  enableTwitterCards = true
  title = "Drew Dalmedo"
  description = "Drew Dalmedo's personal blog."

  [taxonomies]
    tag = "tags"
    category = "categories"

  [[menu.main]]
    url = "/posts"
    name = "All Posts"
    weight = 1
  [[menu.main]]
    url = "/about"
    name = "About Me"
    weight = 2
  [[menu.main]]
    url = "/categories"
    name = "Categories"
    weight = 3
  [[menu.main]]
    url = "/tags"
    name = "Tags"
    weight = 4
  [[menu.main]]
    url = "/index.xml"
    name = "RSS Feed"
    weight = 5

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = "onedark"
    tabWidth = 4
